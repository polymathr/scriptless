services:
  - type: web
    name: scriptless-server
    runtime: docker
    dockerfilePath: ./scriptless/server/Dockerfile
    repo: https://github.com/YOUR_USERNAME/scriptless
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: scriptless-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
    buildCommand: cd scriptless/server && npm ci && npm run build
    startCommand: cd scriptless/server && npm start

  - type: web
    name: scriptless-web
    runtime: static
    buildCommand: cd scriptless/web && npm ci && npm run build
    staticPublishPath: ./scriptless/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://scriptless-server.onrender.com
    routes:
      - type: rewrite
        source: '/*'
        destination: /index.html

databases:
  - name: scriptless-db
    databaseName: scriptless
    user: scriptless
    plan: free