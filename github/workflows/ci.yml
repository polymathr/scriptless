name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scriptless/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scriptless/server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      # - run: npm test  # Enable when tests are written

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scriptless/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scriptless/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint || true
      # - run: npm test  # Enable when tests are written

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Server Docker Image
        run: |
          cd scriptless/server
          docker build -t scriptless-server .
      - name: Build Web Docker Image
        run: |
          cd scriptless/web
          docker build -t scriptless-web .